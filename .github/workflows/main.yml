name: Build Dubligram APK 🚀

on:
  push:
    branches: [ main ] # ЗАПУСКАТЬ, когда Дима сохраняет код в ветку main
  workflow_dispatch:   # Позволяет запустить сборку ВРУЧНУЮ кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK 🧬
        run: |
          # Мы не ищем gradlew, мы просто варим билд напрямую через установленный софт
          sudo apt-get update && sudo apt-get install -y gradle
          gradle assembleDebug

      - name: Upload APK 📦
        uses: actions/upload-artifact@v4
        with:
          name: Dubligram-Genesis-Installer
          path: "**/*.apk"

