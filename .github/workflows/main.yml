name: Build Dubligram APK 🚀

on:
  push:
    branches: [ main ] # ЗАПУСКАТЬ, когда Дима сохраняет код в ветку main
  workflow_dispatch:   # Позволяет запустить сборку ВРУЧНУЮ кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Всегда используй свежий v4 🧬

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Обновили на v4 для стерильности ✨
        with:
          java-version: '17'
          distribution: 'temurin'

      # ВОТ СЮДА СТАВИМ МОЩНУЮ ВОСЬМЕРКУ СРАЗУ ПОСЛЕ JAVA 🏗️🧪
      - name: Setup Gradle 8.0 🦾
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.0

      - name: Build APK 🏗️
        run: gradle assembleDebug

      - name: Upload APK 📦
        uses: actions/upload-artifact@v4
        with:
          name: Dubligram-Genesis-Installer
          path: "**/*.apk"
