name: Build Dubligram APK 🚀

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code 📂
        uses: actions/checkout@v4 # САМАЯ СВЕЖАЯ v4 ✨

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # ТОЖЕ ОБНОВИЛИ ДО v4 🧬
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5 🦾
        uses: gradle/actions/setup-gradle@v3 # ЭТО НОВЫЙ СТАНДАРТ (замена старым v2/v3)
        with:
          gradle-version: "8.5" # ЖЕСТКО В КАВЫЧКАХ 🏗️🧪
          
      - name: Build APK with Stacktrace 🏗️
        run: gradle assembleDebug --stacktrace --info # ТЕПЕРЬ МЫ ВИДИМ ВСЁ! 🧪🧬

      - name: Upload APK 📦
        uses: actions/upload-artifact@v4 # ФИНАЛЬНАЯ v4 ДЛЯ ТВОЕГО APK 📦
        with:
          name: Dubligram-Genesis-Installer
          path: "**/*.apk"
