name: Build Dubligram APK 🚀

on:
  push:
    branches: [ main ] # ЗАПУСКАТЬ, когда Дима сохраняет код в ветку main
  workflow_dispatch:   # Позволяет запустить сборку ВРУЧНУЮ кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          # Если у тебя нет папки 'app', используй просто ./gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK 📦
        uses: actions/upload-artifact@v4 # ТУТ ДОЛЖНО БЫТЬ v4 🧬✨
        with:
          name: Dubligram-Genesis-Installer
          path: "**/*.apk" # Ищет твой готовый файл

