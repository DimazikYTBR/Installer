buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0' // ТВОЙ ИНСТРУМЕНТ 🛠️
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    namespace 'com.dubligram.genesis.installer'
    compileSdk 33
    defaultConfig {
        applicationId "com.dubligram.genesis.installer"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0-Genesis"
    }
}
