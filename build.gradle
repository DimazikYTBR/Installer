// --- ТИТАНОВЫЙ ГРАДЛ БЕЗ ПАПОК @dimz vD2.2,0 ---
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
}

allprojects {
    repositories { google(); mavenCentral() }
}

apply plugin: 'com.android.application'

android {
    namespace 'com.dubligram.genesis.installer'
    compileSdk 33
    
    // ВОТ ОНО! ГОВОРИМ ГРАДЛУ, ЧТО ВСЁ В КОРНЕ 🧼✨
    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['.']
            res.srcDirs = ['res']
        }
    }

    defaultConfig {
        applicationId "com.dubligram.genesis.installer"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0-Genesis"
    }
}
